{%extends 'core/base.html' %}

{%block title%}New Item{%endblock%}

{%block content%}
    <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Create New Item</h2>
        <form method="post" action="{% url 'item:new' %}" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            {% if form.non_field_errors %}
                <div class="text-red-500 text-sm mb-4">
                    {% for error in form.non_field_errors %}
                        {{ error }}
                    {% endfor %}
                </div>
            {% endif %}
            <button type="submit" class="w-full py-3 bg-teal-500 text-white font-semibold rounded hover:bg-teal-700">Create Item</button>
        </form>
    </div>
{%endblock%}
