{% extends 'core/base.html' %}

{% block title %}{{ item.name }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
    <div class="flex flex-col md:flex-row">
        <div class="md:w-1/2">
            <img src="{{ item.image.url }}" alt="{{ item.name }}" class="w-full h-full object-cover">
        </div>
        <div class="md:w-1/2 p-6">
            <h2 class="text-2xl font-bold mb-4">{{ item.name }}</h2>
            <p class="text-gray-600 mb-4">{{ item.category.name }}</p>
            <p class="text-green-600 font-bold text-xl mb-4">${{ item.price }}</p>
            <p class="text-gray-700 mb-6">{{ item.description }}</p>
            <button class="px-6 py-3 bg-blue-500 text-white rounded hover:bg-blue-700">Contact Seller</button>
        </div>
    </div>
</div>
{%endblock%}
