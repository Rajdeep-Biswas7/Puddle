{% extends 'core/base.html' %}

{%block title%}Sign Up{%endblock%}

{%block content%}
    <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Create an Account</h2>
            {% csrf_token %}
            <div class="mb-4">
                <label for="username" class="block text-gray-700 font-semibold mb-2">Username</label>
                <input type="text" id="username" name="username" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-700 font-semibold mb-2">Email</label>
                <input type="email" id="email" name="email" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 font-semibold mb-2">Password</label>
                <input type="password" id="password" name="password" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-300">
                
                {% if form.password.errors %}
                    <p class="text-red-500 text-sm mt-2">{{ form.password.errors }}
                        {%for error in form.password.errors %}
                            {{ error }}
                        {% endfor %}
                    </p>
                {% endif %}
            </div>
            <button type="submit" class="w-full py-3 bg-teal-500 text-white font-semibold rounded hover:bg-teal-700">Sign Up</button>
        </form>
{%endblock%}
