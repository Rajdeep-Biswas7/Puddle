<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}Puddle{% endblock %}</title>
</head>
<body>
    <nav class="py-6 px-6 flex justify-between items-center border-b border-gray-200">
        <a href="/" class="text-xl font-semibold">Puddle</a>
        <div class="space-x-4">
            <a href="/" class="text-gray-700 font-semibold hover:text-blue-500">Home</a>
            <a href="/contact/" class="text-gray-700 font-semibold hover:text-blue-500">Contact</a>

            <a href="#" class=" px-6 py-3 text-lg font-semibold bg-teal-500 text-white rounded -xl hover: bg-teal-700">Sign UP</a>
            <a href="#" class="px-6 py-3 text-lg font-semibold bg-red-500 text-white rounded -xl hover: bg-red-700">Login</a>
        </div>
    </nav>
    <div class="bg-blue-500 text-white p-4">
        <h1 class="text-2xl font-bold">Welcome to Puddle!</h1>
    </div>
    <div class="p-4">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="py-6 px-6 flex justify-between bg-gray-800">
        <div class="w-2/3 pr-10">
            <h3 class="mb-5 font-semibold text-gray-400">About</h3>
            <p class="text-lg text-gray-500">Puddle is a simple web application for managing tasks.</p>

        </div>

        <div class="w-1/3">
            <h3 class="mb-5 font-semibold text-gray-400">Contact</h3>
            <p class="text-lg text-gray-500">Email: info@puddle.com</p>
            <ul class="mt-4">
                <li><a href="#" class="text-gray-500 hover:text-teal-300">Twitter</a></li>
                <li><a href="#" class="text-gray-500 hover:text-teal-300">Facebook</a></li>
                <li><a href="#" class="text-gray-500 hover:text-teal-300">LinkedIn</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
